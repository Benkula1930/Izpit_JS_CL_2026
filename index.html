<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izpit_JS_CL_2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Inline&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">

</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
            <img src="assets/Logo.svg" alt="Logo">
            </div>

            <nav class="header-nav">
                <ul class="header-nav-list">
                    <li class="header-nav-list-item">about</li>
                    <li class="header-nav-list-item">expirience</li>
                    <li class="header-nav-list-item">skill</li>
                    <li class="header-nav-list-item">portfolio</li>
                    <li class="header-nav-list-item">contact</li>
                </ul>
            </nav> <!-- end: header-nav -->
        </header> <!-- end: header-->
    </div>


    <div class="main-container">
        <div class="main">
            <img src="assets/hero-picture.png" alt="picture">
            <div class="main-info">
                <section class="name">John <span>Smith</span></section>
                <section class="work">I design and build things on the internet.</section>
            </div>
        </div>
        <img class="arrow" src="assets/hero-arrow.png" alt="picture">
    </div> <!-- end: main-container-->

    <div class="contact-container">
        <div class="contact-page">
            <h2 class="title">Contact</h2>
            <p class="title-p">I am currently seeking employment, so if you have a job or project offer, 
                or if you need more information, please do not hesitate to contact me.</p>
        </div>

        <a class="btn">Write message</a>

        <div class="social">
            <img class="social--image" src="assets/github-icon.png" alt="social image">
            <img class="social--image" src="assets/linkedin-icon.png" alt="social image">
            <img class="social--image" src="assets/instagram-icon.png" alt="social image">
            <img class="social--image" src="assets/twitter-icon.png" alt="social image">
        </div>

    </div>

</body>
</html>
